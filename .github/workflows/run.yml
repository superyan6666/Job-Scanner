name: 职位扫描任务

# 并发控制：同一时间只允许一个任务运行，彻底解决并发写入冲突
concurrency:
  group: job-scanner
  cancel-in-progress: false

on:
  # 定时触发：每天北京时间早上8点运行（UTC时间0点）
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发测试
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行职位扫描脚本
        env:
          # 从GitHub Secrets读取配置，禁止写死在代码里
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          PROXY_ENABLE: ${{ secrets.PROXY_ENABLE }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python job_scanner.py

      - name: 自动更新去重历史记录和城市配置
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '自动更新职位去重历史记录'
          file_pattern: 'history.json city_map.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
