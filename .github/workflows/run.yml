name: 职位扫描任务

on:
  # 定时触发：每天北京时间早上8点运行（UTC时间0点）
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 运行扫描脚本
        env:
          # 从GitHub Secrets读取你的钉钉Webhook
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python job_scanner.py
        
      - name: 提交更新后的历史记录
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '自动更新去重历史记录'
          file_pattern: 'history.json'
